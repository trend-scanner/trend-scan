metadata:
  project_name: trend-scan
  timezone: Asia/Tokyo

rss:
  max_entries_per_feed: 40
  max_item_age_days: 7
  feeds:
    - id: openai
      name: OpenAI News
      url: https://openai.com/news/rss.xml
      region: global
      kind: official
      priority: true
    - id: google-blog
      name: Google Blog
      url: https://blog.google/rss/
      region: global
      kind: official
      priority: true
    - id: google-developers
      name: Google Developers Blog
      url: https://developers.googleblog.com/feeds/posts/default?alt=rss
      region: global
      kind: official
      priority: true
    - id: youtube-official-blog
      name: YouTube Official Blog
      url: https://blog.youtube/
      parser: youtube_blog_html
      region: global
      kind: official
      priority: true
    - id: meta-newsroom
      name: Meta Newsroom
      url: https://about.fb.com/feed
      region: global
      kind: official
      priority: true
    - id: meta-engineering
      name: Engineering at Meta
      url: https://engineering.fb.com/feed/
      region: global
      kind: official
      priority: true
    - id: github-blog
      name: GitHub Blog
      url: https://github.blog/feed/
      region: global
      kind: official
      priority: true
    - id: cloudflare-blog
      name: Cloudflare Blog
      url: https://blog.cloudflare.com/rss/
      region: global
      kind: official
      priority: true
    - id: anthropic-news
      name: Anthropic News
      url: https://www.anthropic.com/news
      parser: anthropic_news_html
      region: global
      kind: official
      priority: true
    - id: microsoft-ai
      name: Microsoft AI Blog
      url: https://blogs.microsoft.com/ai/feed/
      region: global
      kind: official
      priority: true
    - id: aws-news
      name: AWS News Blog
      url: https://aws.amazon.com/blogs/aws/feed/
      region: global
      kind: official
      priority: true
    - id: the-verge
      name: The Verge
      url: https://www.theverge.com/rss/index.xml
      region: global
      kind: media
      priority: false
    - id: techcrunch
      name: TechCrunch
      url: https://techcrunch.com/feed/
      region: global
      kind: media
      priority: false
    - id: hacker-news-rss
      name: Hacker News RSS
      url: https://news.ycombinator.com/rss
      region: global
      kind: community
      priority: false
    - id: nhk-news
      name: NHK News
      url: https://www3.nhk.or.jp/rss/news/cat0.xml
      region: jp
      kind: media
      priority: false
    - id: itmedia-news
      name: ITmedia NEWS
      url: https://rss.itmedia.co.jp/rss/2.0/news_bursts.xml
      region: jp
      kind: media
      priority: false
    - id: itmedia-ai-plus
      name: ITmedia AI+
      url: https://rss.itmedia.co.jp/rss/2.0/aiplus.xml
      region: jp
      kind: media
      priority: false
    - id: atmarkit
      name: atmarkIT
      url: https://rss.itmedia.co.jp/rss/2.0/ait.xml
      region: jp
      kind: media
      priority: false
    - id: publickey
      name: Publickey
      url: https://www.publickey1.jp/atom.xml
      region: jp
      kind: media
      priority: false

hackernews:
  endpoint: https://hn.algolia.com/api/v1/search_by_date
  window_hours: 24
  hits_per_query: 25

github:
  endpoint: https://api.github.com/search/repositories
  per_query: 15
  sort: updated

wikipedia:
  endpoint_template: https://wikimedia.org/api/rest_v1/metrics/pageviews/per-article/{project}/{access}/{agent}/{article}/{granularity}/{start}/{end}
  access: all-access
  agent: all-agents
  granularity: daily
  request_interval_seconds: 1.0

polymarket:
  gamma_endpoint: https://gamma-api.polymarket.com/markets
  limit: 200
